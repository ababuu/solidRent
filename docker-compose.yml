version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: solidrent-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: solidrent
    ports:
      - "5433:5432"
    volumes:
      - solidrent_pgdata:/var/lib/postgresql/data

volumes:
  solidrent_pgdata:
